<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier — Studio di architettura</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

  <header class="bg-primary">
    <!-- Navbar Bootstrap (navbar-expand-md, sticky in cima) -->
    <nav class="navbar navbar-expand-md navbar-dark">
      <div class="container-fluid justify-content-between">
        <a class="navbar-brand" href="#">
          <h1 class="fs-3 m-0">Atelier</h1>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
          aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="#">Studio</a>
            <a class="nav-link" href="#">Servizi</a>
            <a class="nav-link" href="#">Contatti</a>
          </div>
        </div>
      </div>
    </nav>
  </header>

  <section id="studio" class="container-fluid bg-secondary flex-column  align-content-center text-center">
    <!-- Hero: titolo grande, sottotitolo, CTA. Sfondo brand. min-height 80vh -->

    <h2 class="mb-3">Architettura per spazi che parlano</h2>
    <p class="mb-4">Progettiamo case, uffici e spazi commerciali con attenzione alla luce, ai materiali e al contesto.
    </p>
    <button class="btn"><a class="text-decoration-none" href="#">Inizia un progetto</a></button>


  </section>

  <section id="servizi" class="container-fluid text-center">
    <h2>I nostri servizi</h2>
    <p>Tre aree di lavoro, una sola attenzione alla qualità.</p>
    <!-- 3 card servizi affiancate da md in su -->


  </section>

  <section id="contatti">
    <!-- Form contatti Bootstrap, larghezza limitata e centrata -->
  </section>

  <footer>
    <!-- 3 colonne: Atelier+indirizzo / Link / Contatti. Copyright in fondo -->
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/script.js"></script>
</body>

</html>
